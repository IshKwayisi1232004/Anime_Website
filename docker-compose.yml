version: "3.9"

services:
  postgres:
    image: postgres:17
    container_name: aniverse-postgres

    restart: unless-stopped

    environment:
      POSTGRES_DB: aniverse
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d aniverse"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: